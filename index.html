<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Monkey Quest - Gold Edition</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        
        #game-container { 
            position: relative; width: 100%; height: 68vh; 
            background: linear-gradient(to bottom, #0077be, #001a33); 
            overflow: hidden; border-bottom: 5px solid #ff4500;
        }
        
        /* Moto wa Chini */
        #lava-glow {
            position: absolute; bottom: 0; width: 100%; height: 35px;
            background: linear-gradient(0deg, #ff0000, #ff8c00, #ffff00);
            animation: burn 0.4s infinite alternate; z-index: 5;
            box-shadow: 0 -10px 25px rgba(255, 69, 0, 0.8);
        }
        @keyframes burn { from { opacity: 0.8; height: 25px; } to { opacity: 1; height: 42px; } }

        /* Maandishi ya Dhahabu (UI) */
        #ui-top { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; z-index: 10; }
        .badge { 
            background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 12px; 
            color: #ffd700; border: 2px solid #ffd700; 
            font-size: 16px; font-weight: 900; text-shadow: 2px 2px 4px #000;
        }
        .badge span { color: #ffd700; font-size: 22px; margin-left: 5px; }

        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 100; text-align: center;
        }

        #controls { height: 32vh; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; }
        .top-row { display: flex; align-items: center; gap: 10px; }
        .level-select { background: #333; color: #ffd700; border: 2px solid #ffd700; padding: 8px; border-radius: 8px; font-weight: bold; }
        
        .small-btn { padding: 12px 20px; border-radius: 10px; border: none; font-weight: bold; color: white; font-size: 14px; cursor: pointer; text-transform: uppercase; }
        .retry { background: #e67e22; }
        .start { background: #ffd700; color: #000; }
        .pause-play { background: #7f8c8d; width: 90px; }

        #jump-btn { 
            width: 94%; height: 85px; 
            background: linear-gradient(#ffd700, #d4af37); 
            border: 4px solid #fff; border-radius: 25px; 
            color: #000; font-size: 32px; font-weight: 900;
            box-shadow: 0 6px 20px rgba(255,215,0,0.4);
        }

        .floating-text {
            position: absolute; font-weight: 900; font-size: 35px;
            text-shadow: 3px 3px #000; pointer-events: none; animation: floatUp 0.8s forwards; z-index: 20;
        }
        @keyframes floatUp { from { transform: translateY(0) scale(1); opacity: 1; } to { transform: translateY(-100px) scale(1.8); opacity: 0; } }

        canvas { display: block; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-top">
        <div class="badge">SCORE: <span id="score">0</span></div>
        <div class="badge">MSN: <span id="m-count">0</span>/10</div>
        <div class="badge">LEVEL: <span id="level-display">1</span></div>
    </div>
    
    <div id="lava-glow"></div>

    <div id="level-up" class="overlay">
        <h1 style="color: #ffd700; font-size: 40px;">MONKEY QUEST</h1>
        <h2 style="color: #fff;">LEVEL COMPLETE! 🎯</h2>
        <p style="color: white; font-size: 18px;">Inapakia Changamoto Inayofuata...</p>
    </div>

    <div id="game-over" class="overlay">
        <h1 style="color: #ff4500; font-size: 40px;">GAME OVER! 🐒🔥</h1>
        <p style="color: white; font-size: 20px;">Monkey Quest Imeishia Hapa!</p>
        <button class="small-btn retry" style="font-size: 20px; padding: 15px 40px;" onclick="startGame()">JARIBU TENA</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<div id="controls">
    <div class="top-row">
        <select id="level-picker" class="level-select"></select>
        <button class="small-btn retry" onclick="startGame()">RETRY</button>
        <button id="pp-btn" class="small-btn pause-play" onclick="togglePause()">PAUSE</button>
        <button class="small-btn start" onclick="startGame()">START</button>
    </div>
    <button id="jump-btn">RUKA 🐒</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('game-container');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight * 0.68;

    const picker = document.getElementById('level-picker');
    for(let i=1; i<=30; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.innerHTML = "Level " + i;
        picker.appendChild(opt);
    }

    let score = 0, level = 1, missionCount = 0, frames = 0, gameSpeed = 3.2, gameActive = false, isPaused = false;
    let obstacles = [], collectibles = [];
    const MISSION_GOAL = 10;

    const monkey = {
        x: 70, y: canvas.height / 2, size: 48, velocity: 0, gravity: 0.45, jump: -8,
        draw() {
            ctx.save();
            ctx.translate(this.x + this.size/2, this.y + this.size/2);
            ctx.scale(-1, 1);
            ctx.shadowColor = "#ffd700"; ctx.shadowBlur = 15;
            ctx.font = this.size + "px Arial";
            ctx.fillText("🐒", -this.size/2, this.size/2);
            ctx.restore();
        }
    };

    function showPopupText(txt, x, y, color) {
        const div = document.createElement('div');
        div.className = 'floating-text';
        div.innerText = txt;
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        div.style.color = color;
        container.appendChild(div);
        setTimeout(() => div.remove(), 800);
    }

    function createObstacle() {
        if (missionCount >= MISSION_GOAL) return;
        const gap = Math.max(120, 200 - (level * 2.5)); 
        const h = Math.random() * (canvas.height - gap - 160) + 80;
        
        obstacles.push({ x: canvas.width, top: h, bottom: canvas.height - h - gap, width: 65, passed: false });

        // Koin au Matunda - Uhakika wa kuonekana
        const type = Math.random() > 0.5 ? '💰' : '🍎';
        collectibles.push({ 
            x: canvas.width + 150, 
            y: h + (gap / 2), 
            type: type, 
            collected: false 
        });
    }

    function animate() {
        if (!gameActive || isPaused) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        monkey.velocity += monkey.gravity;
        monkey.y += monkey.velocity;

        if (monkey.y + monkey.size > canvas.height - 30 || monkey.y < 0) endGame();
        monkey.draw();

        // Spawn rate inategemea level lakini speed inabaki imetulia
        let spawnRate = Math.max(70, 100 - (level * 1.1));
        if (frames % Math.floor(spawnRate) === 0 && missionCount < MISSION_GOAL) createObstacle();

        obstacles.forEach((obs, i) => {
            obs.x -= gameSpeed;
            ctx.fillStyle = "#3e2723"; 
            ctx.fillRect(obs.x, 0, obs.width, obs.top);
            ctx.fillRect(obs.x, canvas.height - obs.bottom - 20, obs.width, obs.bottom);
            ctx.fillStyle = "#ffd700"; 
            ctx.fillRect(obs.x, obs.top - 6, obs.width, 6);
            ctx.fillRect(obs.x, canvas.height - obs.bottom - 26, obs.width, 6);

            if (monkey.x + 35 > obs.x && monkey.x < obs.x + obs.width) {
                if (monkey.y < obs.top || monkey.y + 40 > canvas.height - obs.bottom - 20) endGame();
            }

            if (!obs.passed && obs.x + obs.width < monkey.x) {
                score++; missionCount++; obs.passed = true;
                updateUI();
                if (missionCount >= MISSION_GOAL && obstacles.length <= 1) checkLevelComplete();
            }
            if (obs.x + obs.width < -100) obstacles.splice(i, 1);
        });

        collectibles.forEach((item, i) => {
            item.x -= gameSpeed;
            if (!item.collected) {
                ctx.save();
                ctx.shadowColor = item.type === '💰' ? "gold" : "red";
                ctx.shadowBlur = 25;
                ctx.font = "46px Arial";
                ctx.fillText(item.type, item.x, item.y + 15);
                ctx.restore();

                let dX = (monkey.x + 24) - item.x;
                let dY = (monkey.y + 24) - item.y;
                let dist = Math.sqrt(dX*dX + dY*dY);

                if (dist < 48) {
                    item.collected = true;
                    if (item.type === '💰') {
                        score += 5;
                        showPopupText("+5", monkey.x, monkey.y, "#ffd700");
                    } else {
                        score += 10;
                        showPopupText("+10", monkey.x, monkey.y, "#ff0000");
                    }
                    updateUI();
                }
            }
            if (item.x < -100) collectibles.splice(i, 1);
        });

        frames++;
        requestAnimationFrame(animate);
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('level-display').innerText = level;
        document.getElementById('m-count').innerText = missionCount;
    }

    function checkLevelComplete() {
        gameActive = false;
        document.getElementById('level-up').style.display = "flex";
        setTimeout(() => {
            level++; missionCount = 0; 
            gameSpeed += 0.1; // Speed inaongezeka kidogo sana
            document.getElementById('level-up').style.display = "none";
            obstacles = []; collectibles = [];
            monkey.y = canvas.height / 2; monkey.velocity = 0;
            updateUI();
            gameActive = true;
            animate();
        }, 2000);
    }

    function togglePause() {
        if (!gameActive) return;
        isPaused = !isPaused;
        document.getElementById('pp-btn').innerText = isPaused ? "PLAY" : "PAUSE";
        if (!isPaused) animate();
    }

    function endGame() {
        gameActive = false;
        document.getElementById('game-over').style.display = "flex";
    }

    function startGame() {
        level = parseInt(document.getElementById('level-picker').value);
        score = 0; missionCount = 0; 
        gameSpeed = 3.2 + (level * 0.08); 
        obstacles = []; collectibles = [];
        monkey.y = canvas.height / 2; monkey.velocity = 0;
        document.querySelectorAll('.overlay').forEach(el => el.style.display = "none");
        isPaused = false;
        document.getElementById('pp-btn').innerText = "PAUSE";
        updateUI();
        gameActive = true;
        animate();
    }

    const jump = () => { if(gameActive && !isPaused) monkey.velocity = monkey.jump; };
    document.getElementById('jump-btn').addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
    document.getElementById('jump-btn').addEventListener('mousedown', jump);
</script>
</body>
</html>
